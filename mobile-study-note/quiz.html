<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>教則網羅クイズ演習</title>
  <meta name="description" content="二等無人航空機操縦士の学科試験対策として、穴埋めで教則本文を読み進めるモードと本試験形式クイズを切り替えて学べるページです。">
  <meta name="theme-color" content="#123f36">
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
  <header class="quiz-hero">
    <nav class="quiz-nav-top">
      <a href="index.html">教則ノート</a>
      <button id="themeToggle" type="button" aria-label="表示テーマを切り替え">◐</button>
    </nav>
    <div class="hero-copy">
      <p>三肢択一式 / 穴埋め読解 / 本試験形式</p>
      <h1>教則網羅<br>クイズ演習</h1>
      <span>教則本文を穴埋めしながら読み進めるモードと、知識を問う本試験形式クイズを切り替えられます。分野を複数選んでランダム10問にも対応します。</span>
    </div>
  </header>

  <main class="quiz-app">
    <section class="control-panel" aria-label="出題設定">
      <div class="panel-title">
        <h2>出題設定</h2>
        <p id="bankSummary">読み込み中...</p>
      </div>
      <div class="bank-tabs" role="tablist" aria-label="クイズ形式">
        <button class="active" type="button" data-bank="cloze">穴埋め読解</button>
        <button type="button" data-bank="exam">本試験形式</button>
      </div>
      <div class="mode-actions">
        <button class="primary" id="orderedButton" type="button">選択分野を教則順で学ぶ</button>
        <button class="secondary" id="randomButton" type="button">選択分野からランダム10問</button>
      </div>
      <div class="control-actions">
        <button class="secondary" id="resetButton" type="button">このセットをリセット</button>
      </div>
      <div class="category-head">
        <span>分野を選択</span>
        <div>
          <button class="mini-button" id="selectAllButton" type="button">全選択</button>
          <button class="mini-button" id="clearCategoriesButton" type="button">解除</button>
        </div>
      </div>
      <div class="category-options" id="categoryOptions"></div>
    </section>

    <section class="question-panel" aria-label="クイズ">
      <div class="progress-strip">
        <span id="questionCounter">問 - / -</span>
        <span id="scoreCounter">0問回答</span>
      </div>
      <div class="meter"><span id="answerMeter"></span></div>
      <article class="question-card" id="questionCard">
        <div class="question-meta">
          <span id="questionCategory">分野</span>
          <span id="questionSource">出典</span>
        </div>
        <div class="question-actions">
          <button class="secondary" id="prevButton" type="button">前へ</button>
          <button class="primary" id="nextButton" type="button">次へ</button>
        </div>
        <h2 id="questionText">問題セットを選んで開始してください。</h2>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback" hidden></div>
        <div class="previous-review" id="previousReview" hidden></div>
      </article>
    </section>

    <aside class="list-panel" aria-label="問題リスト">
      <div class="panel-title compact">
        <h2>問題リスト</h2>
        <p id="listSummary">未回答を確認できます。</p>
      </div>
      <div class="question-list" id="questionList"></div>
    </aside>
  </main>

  <script src="quiz.js"></script>
</body>
</html>
